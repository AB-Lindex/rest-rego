# https://taskfile.dev

version: '3'

tasks:
  default:
    preconditions:
      - which tail
      - which tr
      - which sed
      - which gum
    cmds:
      - task: choose

  choose:
    dep: [prereq]
    vars:
      TITLE:
        sh: task --list | head -1
      TASKS:
        sh: |
          task --list --sort none |
          tail +2 |
          tr "\'" "\`" |
          sed -E "s/(.*)/'\1'/" | tr "\n" " "
      CHOICE:
        sh: gum choose --header="{{.TITLE}}" {{.TASKS}}
      TASK:
        sh: echo "{{.CHOICE}}" | sed -E 's/\* ([^:]+):.*/\1/'
    cmds:
      - task: "{{.TASK}}"
    silent: true
      
  test:
    desc: Run all tests
    cmds:
      - find . -name "*_test.go" | xargs -n1 dirname | sort -u | xargs -n1 go test
  
  build:
    desc: Build both standard and pprof-enabled binaries
    cmds:
      - go build -o bin/restrego ./cmd
      - go build -tags pprof -o bin/restrego-pprof ./cmd

  scan:
    desc: Scan source code and dependencies for vulnerabilities using Trivy
    preconditions:
      - which podman
    cmds:
      - mkdir -p ./temp/trivy-db
      - podman run --rm
          -v ./:/workspace:ro,z
          -v ./.trivyignore:/.trivyignore:ro,z
          -v ./temp/trivy-db:/trivy-cache:z
          docker.io/aquasec/trivy:latest
          fs --config /workspace/trivy.yaml --scanners vuln,secret,misconfig /workspace

  scan-image:
    desc: Build and scan the container image for vulnerabilities using Trivy
    preconditions:
      - which podman
    vars:
      IMAGE: rest-rego:latest
    cmds:
      - mkdir -p ./temp/trivy-db
      - podman build -t {{.IMAGE}} .
      - podman save {{.IMAGE}} -o /tmp/trivy-scan-image.tar
      - podman run --rm
          -v /tmp/trivy-scan-image.tar:/image.tar:ro,z
          -v ./trivy.yaml:/trivy.yaml:ro,z
          -v ./.trivyignore:/.trivyignore:ro,z
          -v ./temp/trivy-db:/trivy-cache:z
          docker.io/aquasec/trivy:latest
          image --config /trivy.yaml --input /image.tar
      - rm -f /tmp/trivy-scan-image.tar
  
  run-azure:
    desc: Run the restrego using Azure OIDC
    env:
      WELLKNOWN_OIDC: https://login.microsoftonline.com/common/v2.0/.well-known/openid-configuration
      JWT_AUDIENCES: test
      EXPOSE_BLOCKED_HEADERS: "true"
    cmds:
      - bin/restrego --debug --verbose