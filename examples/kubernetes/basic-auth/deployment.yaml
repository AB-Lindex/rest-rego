apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      k8s-app: demo
  template:
    metadata:
      labels:
        k8s-app: demo
    spec:
      containers:
        - name: main
          image: ninlil/http-https-echo
          imagePullPolicy: IfNotPresent
          livenessProbe:
            httpGet:
              path: /health
              port: 10000
            initialDelaySeconds: 2
          readinessProbe:
            httpGet:
              path: /ready
              port: 10000

        - name: sidecar
          image: lindex/rest-rego
          imagePullPolicy: IfNotPresent
          env:
            - name: BACKEND_PORT
              value: '10000'
            - name: BASIC_AUTH_FILE
              value: /etc/rest-rego/users.htpasswd
          ports:
            - containerPort: 8181
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8182
            initialDelaySeconds: 2
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8182
          volumeMounts:
            - name: policies
              mountPath: /policies
            - name: htpasswd
              mountPath: /etc/rest-rego
              readOnly: true

      serviceAccount: demo
      serviceAccountName: demo

      volumes:
        - name: policies
          configMap:
            name: demo-policies
        - name: htpasswd
          secret:
            secretName: demo-htpasswd
