# .github/workflows/release.yaml

on:
  release:
    types: [created]

permissions: {} # Rely on job-level permissions only

jobs:
  releases-matrix:
    name: Release Go Binary
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to upload release assets
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Get Version
      run: bash ./tools/get_version.sh

    - name: Build assets
      uses: wangyoucao577/go-release-action@v1
      with:
        project_path: ./cmd
        github_token: ${{ secrets.GITHUB_TOKEN }}
        goos: ${{ matrix.goos }}
        goarch: ${{ matrix.goarch }}
        binary_name: restrego
        md5sum: FALSE
        sha256sum: TRUE

  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # Required to checkout repository
      id-token: write  # Required for provenance signing (OIDC)

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Get Version
      run: bash ./tools/get_version.sh

    - name: Docker meta (stable)
      id: meta-stable
      if: ${{ !github.event.release.prerelease }}
      uses: docker/metadata-action@v4
      with:
        images: |
          lindex/rest-rego
        tags: |
          type=semver,pattern=v{{version}}
          type=semver,pattern=v{{major}}.{{minor}}
          type=semver,pattern=v{{major}}
        labels: |
          org.opencontainers.image.title=restrego
          org.opencontainers.image.description=Protect your REST API with Rego policies
          org.opencontainers.image.source=https://github.com/AB-Lindex/rest-rego
          org.opencontainers.image.url=https://github.com/AB-Lindex/rest-rego
          org.opencontainers.image.licenses=MIT

    - name: Docker meta (prerelease)
      id: meta-beta
      if: ${{ github.event.release.prerelease }}
      uses: docker/metadata-action@v4
      with:
        images: |
          lindex/rest-rego-beta
        tags: |
          type=semver,pattern=v{{version}}-beta
          type=semver,pattern=v{{major}}.{{minor}}-beta
          type=semver,pattern=v{{major}}-beta
        labels: |
          org.opencontainers.image.title=restrego
          org.opencontainers.image.description=Protect your REST API with Rego policies
          org.opencontainers.image.source=https://github.com/AB-Lindex/rest-rego
          org.opencontainers.image.url=https://github.com/AB-Lindex/rest-rego
          org.opencontainers.image.licenses=MIT

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USER }}
        password: ${{ secrets.DOCKERHUB_SECRET }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
        
    - name: Build and push Docker images
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        sbom: true
        provenance: mode=max
        tags: ${{ steps.meta-stable.outputs.tags || steps.meta-beta.outputs.tags }}
        labels: ${{ steps.meta-stable.outputs.labels || steps.meta-beta.outputs.labels }}